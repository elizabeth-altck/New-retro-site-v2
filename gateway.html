<!DOCTYPE html>
<html>
<head>
  <title>GATEWAY</title>

  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Press Start 2P', monospace;
      color: white;
      background: black;
    }

    .top {
      padding: 20px;
      border-bottom: 2px solid white;
      text-align: center;
      font-size: 12px;
      text-transform: uppercase;
    }

    .container {
      display: flex;
      justify-content: center;
      gap: 30px;
      padding: 60px;
      flex-wrap: wrap;
    }

    .card {
      width: 300px;
      border: 2px solid white;
      padding: 20px;
      text-align: center;
      background: rgba(255,255,255,0.05);
      cursor: pointer;
      transition: 0.2s;
    }

    .card:hover {
      transform: scale(1.05);
      background: white;
      color: black;
    }

    .ru {
      font-family: Arial, sans-serif;
      font-size: 12px;
      margin-top: 10px;
      text-transform: none;
    }

    a {
      color: inherit;
      text-decoration: none;
    }
  </style>
</head>

<body>

  <div class="top">
    GATEWAY SYSTEM / ВЫБОР РЕЖИМА
  </div>

  <div class="container">

    <a href="forest.html">
      <div class="card">
        FOREST MODE<br>
        <div class="ru">РЕЖИМ ЛЕСА / АТМОСФЕРА / ХАОС</div>
      </div>
    </a>

    <a href="system.html">
      <div class="card">
        SYSTEM MODE<br>
        <div class="ru">СИСТЕМА / СТРУКТУРА / ИНФОРМАЦИЯ</div>
      </div>
    </a>

  </div>

</body>
</html>
