<!DOCTYPE html>
<html>
<head>
  <title>RETRO ENTRY</title>

  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;

      /* 🌲 ТВОЙ ФОН (локальный файл) */
      background-image: url("forest_and_lake.jpeg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;

      font-family: 'Press Start 2P', monospace;
      color: white;
    }

    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.65);
    }

    .box {
      position: relative;
      z-index: 1;

      text-align: center;

      padding: 40px;
      border: 2px solid white;

      background: rgba(0,0,0,0.4);
      box-shadow: 0 0 20px rgba(255,255,255,0.2);
    }

    h1 {
      font-size: 28px;
      text-transform: uppercase;
      letter-spacing: 3px;
    }

    p {
      margin-top: 15px;
      opacity: 0.8;
      text-transform: uppercase;
      font-size: 10px;
      line-height: 1.8;
    }

    button {
      margin-top: 25px;
      padding: 15px 20px;

      font-family: 'Press Start 2P', monospace;
      font-size: 10px;

      border: 2px solid white;
      background: transparent;
      color: white;

      cursor: pointer;
      text-transform: uppercase;
      transition: 0.2s;
    }

    button:hover {
      background: white;
      color: black;
      transform: scale(1.05);
    }
  </style>
</head>

<body>

  <div class="overlay"></div>

  <div class="box">

    <h1>WELCOME</h1>

    <p>
      ENTER THE SITE<br>
      SYSTEM LOADING...<br>
      DO NOT TRUST THE SIGNAL
    </p>

    <a href="main.html">
      <button>ENTER</button>
    </a>

  </div>

</body>
</html>
