<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MAIN WORLD</title>

<link href="https://fonts.googleapis.com/css2?family=Jura:wght@400;500;600&family=Press+Start+2P&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
:root {
  --page-padding: 25px;
  --column-gap: 20px;
}

body {
  margin: 0;
  font-family: 'Share Tech Mono', monospace;
  color: #1b1b1b;

  background-image: url("images/поле.jpeg");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  background-attachment: fixed;
}

/* HEADER */
.site-header {
  margin-bottom: 4px;
}

.ticker {
  width: 100%;
  overflow: hidden;
  background: #0a0a0a;
  border-bottom: 1px solid #222;
}

.ticker-text {
  white-space: nowrap;
  font-family: 'Press Start 2P', monospace;
  font-size: 11px;
  color: #ffffff;
  padding: 9px 0;
  animation: tickerScroll 28s linear infinite;
}

@keyframes tickerScroll {
  from { transform: translateX(100%); }
  to { transform: translateX(-100%); }
}

.title-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  padding: 14px var(--page-padding) 10px;
}

.site-title {
  font-family: 'Press Start 2P', monospace;
  font-size: 46px;
  line-height: 1.15;
  color: #9b1c1c;
  margin: 0;
  letter-spacing: 1px;
  text-shadow:
    -1px -1px 0 rgba(255, 250, 219, 0.6),
    3px 3px 0 #58131D,
    5px 5px 0 #000000,
    7px 7px 0 #000000;
}

.title-accent {
  flex-shrink: 0;
  width: 72px;
  height: 72px;
}

/* LAYOUT */
.layout {
  display: grid;
  grid-template-columns: 15fr 70fr 15fr;
  gap: var(--column-gap);
  padding: 8px var(--page-padding) var(--page-padding);
}

/* SIDEBARS */
.left,
.right {
  font-family: 'Jura', sans-serif;
  background: rgba(0, 0, 0, 0.55);
  color: #f2f2f2;
  padding: 16px 14px;
  border: 1px solid rgba(255, 255, 255, 0.12);
}

.left {
  box-shadow:
    inset 14px 0 22px -8px rgba(22, 58, 35, 0.92),
    inset 0 5px 12px -7px rgba(22, 58, 35, 0.5);
}

.right {
  box-shadow:
    inset -14px 0 22px -8px rgba(22, 58, 35, 0.92),
    inset 0 5px 12px -7px rgba(22, 58, 35, 0.5);
}

.left-nav-title {
  font-size: 22px;
  font-weight: normal;
  margin: 0 0 14px;
  padding-bottom: 12px;
  line-height: 1.3;
  color: #f5ecd4;
  border-bottom: 1px solid rgba(245, 236, 212, 0.22);
}

.left-nav-list {
  list-style: none;
  margin: 0;
  padding: 0;
}

.left-nav-list li + li {
  margin-top: 2px;
}

.left-nav-list a {
  display: block;
  padding: 10px 8px 10px 6px;
  font-size: 18px;
  line-height: 1.4;
  color: #f2f2f2;
  text-decoration: none;
  border-left: 2px solid transparent;
  transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
}

.left-nav-list a::before {
  content: '>';
  margin-right: 8px;
  font-weight: bold;
}

.left-nav-list li:nth-child(1) a::before { color: #e8a0c8; }
.left-nav-list li:nth-child(2) a::before { color: #8fd4a8; }
.left-nav-list li:nth-child(3) a::before { color: #9ec5e8; }
.left-nav-list li:nth-child(4) a::before { color: #e8c86a; }

.left-nav-list a:hover {
  color: #ffffff;
  background: rgba(255, 255, 255, 0.07);
  border-left-color: rgba(245, 236, 212, 0.45);
}

.right h3 {
  font-size: 22px;
  font-weight: 600;
  margin: 0 0 16px;
  line-height: 1.3;
}

.right-line {
  font-size: 18px;
  margin: 12px 0;
  line-height: 1.45;
}

.right-line strong {
  font-weight: 600;
}

.status-online {
  font-weight: 500;
  animation: statusBlink 1.4s ease-in-out infinite;
}

.status-dot {
  display: inline-block;
  width: 8px;
  height: 8px;
  margin-right: 7px;
  border-radius: 50%;
  background: #3dd96a;
  box-shadow: 0 0 6px rgba(61, 217, 106, 0.85);
  vertical-align: middle;
  animation: statusBlink 1.4s ease-in-out infinite;
}

@keyframes statusBlink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

.right ul {
  margin: 10px 0 0;
  padding-left: 20px;
}

.right li {
  font-size: 18px;
  margin: 10px 0;
  line-height: 1.45;
}

.core {
  min-height: 80vh;
  background: rgba(155, 143, 67, 0.9);
  padding: 25px;
  border: 2px solid rgba(232, 228, 196, 0.85);
  box-shadow:
    5px 6px 14px rgba(0, 0, 0, 0.42),
    inset 2px 2px 0 rgba(255, 248, 210, 0.55),
    inset -2px -2px 0 rgba(60, 55, 30, 0.22);
}

.core-title {
  font-family: 'Press Start 2P', monospace;
  font-size: 84px;
  line-height: 1.08;
  color: #000;
  text-align: center;
  margin: 0 0 18px;
  letter-spacing: 0;
  text-shadow:
    -1px -1px 0 rgba(198, 192, 178, 0.52),
    -2px -2px 2px rgba(172, 167, 155, 0.38),
    4px 4px 0 #36391C,
    8px 8px 0 #2a2520,
    13px 13px 0 #141414;
}

</style>
</head>

<body>

<header class="site-header">
  <div class="ticker">
    <div class="ticker-text">
      old net core · атмосфера 2000-2010х · old net core · атмосфера 2000-2010х ·
    </div>
  </div>
  <div class="title-row">
    <h1 class="site-title">MAIN WORLD</h1>
    <div class="title-accent" aria-hidden="true"></div>
  </div>
</header>

<div class="layout">

<!-- LEFT -->
<div class="left">
  <nav class="left-nav" aria-label="Navigation">
    <h3 class="left-nav-title">Navigation</h3>
    <ul class="left-nav-list">
      <li><a href="#">gallery</a></li>
      <li><a href="#">diary</a></li>
      <li><a href="#">music</a></li>
      <li><a href="#">secret door</a></li>
    </ul>
  </nav>
</div>

<!-- CENTER -->
<div class="center">
  <div class="core">

    <h2 class="core-title">my site</h2>

  </div>
</div>

<!-- RIGHT -->
<div class="right">
  <h3>LIVE SYSTEM</h3>

  <p class="right-line">
    <strong>STATUS:</strong>
    <span class="status-online">
      <span class="status-dot" aria-hidden="true"></span>ONLINE
    </span>
  </p>
  <p class="right-line"><strong>FIELD:</strong> unstable but fine</p>

  <p class="right-line"><strong>EVENTS:</strong></p>
  <ul>
    <li>hotdog broadcast active</li>
    <li>unknown signal detected</li>
  </ul>
</div>

</div>

</body>
</html>
