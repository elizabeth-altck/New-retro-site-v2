<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MAIN WORLD</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  font-family: 'Share Tech Mono', monospace;

  background-image: url("images/поле.jpeg");
  background-size: cover;
  background-position: center;
  background-attachment: fixed;

  cursor: none;
}

/* ================= CURSOR ================= */

#cursor {
  position: fixed;
  width: 42px;
  height: 42px;
  pointer-events: none;
  z-index: 99999;
  transform: translate(-50%, -50%);
}

/* ================= MARQUEE ================= */

.marquee {
  width: 100%;
  overflow: hidden;
  background: repeating-linear-gradient(
    45deg,
    #ffea00,
    #ffea00 20px,
    #ff8800 20px,
    #ff8800 40px
  );
  border-bottom: 3px solid black;
}

.marquee span {
  display: inline-block;
  white-space: nowrap;
  font-family: 'Press Start 2P';
  font-size: 10px;
  padding: 12px 0;
  animation: scroll 18s linear infinite;
}

@keyframes scroll {
  from { transform: translateX(100%); }
  to { transform: translateX(-100%); }
}

/* ================= LAYOUT ================= */

.layout {
  display: flex;
  gap: 12px;
  padding: 18px;
}

.left { width: 12%; }
.center { width: 66%; overflow: hidden; }
.right { width: 22%; }

/* ================= MAIN WORLD UPGRADE ================= */

.core {
  min-height: 85vh;

  background: linear-gradient(145deg, rgba(255,255,255,0.85), rgba(255,240,255,0.65));
  border-radius: 22px;

  border: 3px solid rgba(0,0,0,0.4);

  box-shadow:
    inset 0 6px 14px rgba(0,0,0,0.25),
    0 18px 30px rgba(0,0,0,0.35);

  padding: 20px;

  position: relative;
}

/* ================= BIG TITLE (MAIN WORLD) ================= */

h1 {
  font-family: 'Press Start 2P';
  font-size: 22px;

  background: white;
  display: inline-block;

  padding: 10px 14px;

  border: 3px solid black;

  box-shadow:
    4px 4px 0 black,
    8px 8px 0 rgba(0,0,0,0.3);

  transform: rotate(-1deg);
}

/* ================= GIF WORLD TITLE ================= */

.gif-world {
  margin-top: 12px;

  font-family: 'Press Start 2P';
  font-size: 18px;

  color: #ff00cc;

  text-shadow:
    2px 2px black,
    0 0 10px #ff00cc,
    0 0 20px #00ffff;

  animation: glitch 1.5s infinite;
}

@keyframes glitch {
  0% { transform: translate(0,0); }
  20% { transform: translate(1px,-1px); }
  40% { transform: translate(-1px,1px); }
  60% { transform: translate(2px,0); }
  80% { transform: translate(-2px,1px); }
  100% { transform: translate(0,0); }
}

/* ================= NOTE ================= */

.note-box {
  margin-top: 15px;
  padding: 18px;

  border-radius: 18px;

  background: linear-gradient(135deg,#fff,#ffd6ff,#d6f7ff);

  border: 3px solid black;

  box-shadow:
    inset 0 4px 10px rgba(0,0,0,0.25),
    0 10px 18px rgba(0,0,0,0.35);
}

/* ================= GALLERY ================= */

.gallery {
  margin-top: 20px;
  padding: 10px;

  border: 2px solid black;
  background: rgba(255,255,255,0.6);

  overflow: hidden;
}

.carousel {
  display: flex;
  gap: 10px;
  width: max-content;
  animation: move 14s linear infinite;
}

.carousel img {
  width: 140px;
  height: 100px;
  object-fit: cover;
  border: 2px solid black;
}

/* ================= ANIMATION ================= */

@keyframes move {
  from { transform: translateX(0); }
  to { transform: translateX(-40%); }
}

</style>
</head>

<body>

<img id="cursor" src="images/snail-slug.gif">

<div class="marquee">
  <span>🌭 SYSTEM ACTIVE • MEMORY CORRUPTION • CLICK EVERYTHING • GLITCH WORLD ONLINE •</span>
</div>

<div class="layout">

<div class="left">
  <div>gallery</div>
  <div>diary</div>
  <div>music</div>
  <div>secret</div>
</div>

<div class="center">
<div class="core">

<!-- 🧠 MAIN TITLE UPGRADED -->
<h1>MAIN WORLD</h1>

<!-- ✨ NEW TITLE -->
<div class="gif-world">GIF WORLD</div>

<p>you are inside a living system.</p>

<!-- NOTE -->
<div class="note-box">
  <b>Ты можешь написать сюда заметку</b>
  <textarea></textarea>
</div>

<!-- GALLERY -->
<div class="gallery">
  <div class="carousel">

    <img src="https://media.giphy.com/media/3oEjI6SIIHBdRxXI40/giphy.gif">
    <img src="https://media.giphy.com/media/l0MYt5jPR6QX5pnqM/giphy.gif">
    <img src="https://media.giphy.com/media/26ufdipQqU2lhNA4g/giphy.gif">
    <img src="https://media.giphy.com/media/xT0xeJpnrWC4XWblEk/giphy.gif">

  </div>
</div>

</div>
</div>

</div>

<script>

const cursor = document.getElementById("cursor");

document.addEventListener("mousemove", e => {
  cursor.style.left = e.clientX + "px";
  cursor.style.top = e.clientY + "px";
});

</script>

</body>
</html>
