<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MAIN WORLD</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Share Tech Mono', monospace;
  background: url("images/поле.jpeg") center/cover fixed;
  color: #111;
}

/* TOP CHAOS */
.hotdog-banner {
  width: 100%;
  overflow: hidden;
  background: repeating-linear-gradient(45deg,#ffea00,#ffea00 20px,#ff8800 20px,#ff8800 40px);
  border-bottom: 3px solid black;
}

.hotdog-text {
  white-space: nowrap;
  font-family: 'Press Start 2P';
  font-size: 11px;
  padding: 14px 0;
  animation: scroll 18s linear infinite;
}

@keyframes scroll {
  from { transform: translateX(100%); }
  to { transform: translateX(-100%); }
}

/* LAYOUT */
.layout {
  display: flex;
  gap: 20px;
  padding: 25px;
}

/* LEFT */
.left {
  width: 12%;
  background: rgba(255,255,255,0.18);
  backdrop-filter: blur(6px);
  padding: 12px;
}

/* CENTER */
.center { width: 76%; }

.core {
  min-height: 80vh;
  background: rgba(255,255,255,0.75);
  padding: 25px;
  position: relative;
  overflow: hidden;
}

/* RIGHT */
.right {
  width: 12%;
  background: rgba(20,20,20,0.35);
  color: white;
  padding: 15px;
}

/* BUTTONS */
button {
  margin: 5px;
  padding: 6px 10px;
  border: 1px solid black;
  background: white;
  cursor: pointer;
}

/* POPUP SYSTEM */
.popup {
  position: fixed;
  top: 25%;
  left: 50%;
  transform: translateX(-50%);
  background: #fff;
  border: 3px solid black;
  padding: 15px;
  display: none;
  z-index: 999;
  width: 300px;
}

/* INPUT STYLE */
input {
  width: 100%;
  padding: 6px;
  border: 1px solid black;
}

/* FLOATING CHAOS */
.frog {
  position: absolute;
  width: 80px;
  animation: jump 4s infinite ease-in-out;
}

@keyframes jump {
  0% { transform: translateY(0); }
  50% { transform: translateY(-30px) rotate(10deg); }
  100% { transform: translateY(0); }
}
</style>
</head>

<body>

<div class="hotdog-banner">
  <div class="hotdog-text">
    🌭 SYSTEM BROADCAST: FREE HOTDOG EVENT ACTIVE • DO NOT TRUST REALITY • CLICK ANYTHING
  </div>
</div>

<div class="layout">

<div class="left">
  <b>NAV</b><br>
  gallery<br>diary<br>music
</div>

<div class="center">
<div class="core">

  <h1>MAIN WORLD</h1>

  <p id="txt">stable memory stream...</p>

  <button onclick="openCode()">ENTER CODE</button>
  <button onclick="glitchText()">GLITCH TEXT</button>
  <button onclick="spawnFrogs()">SUMMON FROGS</button>

  <!-- FROGS -->
  <img class="frog" id="frog1" src="https://media.giphy.com/media/3o7aD2saalBwwftBIY/giphy.gif" style="top:20px;left:40px;">
  <img class="frog" id="frog2" src="https://media.giphy.com/media/l0MYt5jPR6QX5pnqM/giphy.gif" style="top:200px;left:300px;">

</div>
</div>

<div class="right">
  <h3>STATUS</h3>
  ONLINE<br>
  unstable but ok
</div>

</div>

<!-- CODE POPUP -->
<div class="popup" id="codePopup">
  <p>ENTER ACCESS CODE:</p>
  <input id="codeInput" placeholder="xxxx-xxxx">
  <button onclick="checkCode()">SUBMIT</button>
  <p id="result"></p>
</div>

<script>

function openCode(){
  document.getElementById("codePopup").style.display = "block";
}

function checkCode(){
  const val = document.getElementById("codeInput").value;
  const res = document.getElementById("result");

  const outcomes = [
    "ACCESS GRANTED (maybe)",
    "NOTHING HAPPENED",
    "SYSTEM IGNORED YOU",
    "▒▒▒ ERROR BUT OK",
    "HOTDOG DETECTED"
  ];

  res.innerText = outcomes[Math.floor(Math.random()*outcomes.length)];
}

function glitchText(){
  document.getElementById("txt").innerText =
  "signal corrupted... reality unstable...";
}

function spawnFrogs(){
  document.querySelectorAll(".frog").forEach(f=>{
    f.style.left = Math.random()*80 + "%";
    f.style.top = Math.random()*70 + "%";
  });
}

</script>

</body>
</html>
