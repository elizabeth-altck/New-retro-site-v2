<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MAIN WORLD</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Share Tech Mono', monospace;
  background: url("images/поле.jpeg") center/cover fixed;
  color: #111;
}

/* TOP BAR */
.hotdog-banner {
  width: 100%;
  overflow: hidden;
  background: repeating-linear-gradient(45deg,#ffea00,#ffea00 20px,#ff8800 20px,#ff8800 40px);
  border-bottom: 3px solid black;
}

.hotdog-text {
  white-space: nowrap;
  font-family: 'Press Start 2P';
  font-size: 11px;
  padding: 14px 0;
  animation: scroll 18s linear infinite;
}

@keyframes scroll {
  from { transform: translateX(100%); }
  to { transform: translateX(-100%); }
}

/* LAYOUT */
.layout {
  display: flex;
  gap: 20px;
  padding: 25px;
}

.left { width: 12%; background: rgba(255,255,255,0.2); padding: 12px; }
.center { width: 76%; }
.right { width: 12%; background: rgba(0,0,0,0.4); color: white; padding: 15px; }

/* CORE */
.core {
  min-height: 80vh;
  background: rgba(255,255,255,0.78);
  padding: 25px;
  position: relative;
  overflow: hidden;
}

/* BUTTONS */
button {
  margin: 5px;
  padding: 6px 10px;
  border: 2px solid black;
  background: white;
  cursor: pointer;
}

/* =========================
   POPUP — UPGRADED CHAOS
========================= */

.popup {
  position: fixed;
  top: 22%;
  left: 50%;
  transform: translateX(-50%);
  background: #fff;
  border: 6px solid #ff2d2d; /* 🔥 thicker + aggressive */
  padding: 18px;
  display: none;
  z-index: 999;
  width: 320px;
  box-shadow: 0 0 25px rgba(255,0,0,0.5);
  font-family: 'Press Start 2P';
}

.popup button {
  margin-top: 10px;
  border: 2px solid black;
}

/* CHAOS FROGS */
.frog {
  position: absolute;
  width: 70px;
  animation: jump 4s infinite ease-in-out;
}

@keyframes jump {
  0% { transform: translateY(0); }
  50% { transform: translateY(-25px) rotate(8deg); }
  100% { transform: translateY(0); }
}

/* QUIZ BLOCKS */
.quiz {
  margin-top: 15px;
  padding: 10px;
  border: 2px dashed black;
  background: rgba(255,255,255,0.6);
}
</style>
</head>

<body>

<div class="hotdog-banner">
  <div class="hotdog-text">
    🌭 SYSTEM ALERT: FREE HOTDOG DISTRIBUTION ACTIVE • REALITY UNSTABLE • CLICK RANDOMLY •
  </div>
</div>

<div class="layout">

<div class="left">
  <b>NAV</b><br>
  gallery<br>diary<br>music
</div>

<!-- ================= CENTER ================= -->
<div class="center">
<div class="core">

  <h1>MAIN WORLD</h1>

  <p id="txt">stable memory stream...</p>

  <button onclick="openCode()">ENTER CODE</button>
  <button onclick="glitchText()">GLITCH</button>

  <!-- 🧠 INTERACTIVE CHAOS BLOCKS -->
  <div class="quiz">
    <b>QUESTION 01:</b><br>
    ты сейчас кто?<br>
    <button onclick="react('lost')">потерянный</button>
    <button onclick="react('fine')">норм</button>
    <button onclick="react('chaos')">хаос</button>
  </div>

  <div class="quiz">
    <b>QUESTION 02:</b><br>
    выбрать состояние системы:<br>
    <button onclick="react('ok')">ok</button>
    <button onclick="react('error')">error</button>
    <button onclick="react('hotdog')">hotdog</button>
  </div>

  <p id="reactionText"></p>

  <!-- FROGS -->
  <img class="frog" style="top:30px;left:40px;" src="https://media.giphy.com/media/3o7aD2saalBwwftBIY/giphy.gif">
  <img class="frog" style="top:220px;left:280px;" src="https://media.giphy.com/media/l0MYt5jPR6QX5pnqM/giphy.gif">

</div>
</div>

<!-- RIGHT -->
<div class="right">
  <h3>STATUS</h3>
  ONLINE<br>
  unstable
</div>

</div>

<!-- ================= POPUP ================= -->
<div class="popup" id="codePopup">
  <p>ENTER CODE</p>
  <input id="codeInput" placeholder="xxxx-xxxx">
  <button onclick="checkCode()">SUBMIT</button>
  <p id="result"></p>
</div>

<script>

function openCode(){
  document.getElementById("codePopup").style.display = "block";
}

function checkCode(){
  const outcomes = [
    "ACCESS GRANTED (maybe)",
    "NOTHING HAPPENED",
    "SYSTEM IGNORED INPUT",
    "▒▒ ERROR BUT OK",
    "HOTDOG SIGNAL FOUND"
  ];

  document.getElementById("result").innerText =
    outcomes[Math.floor(Math.random()*outcomes.length)];
}

function glitchText(){
  document.getElementById("txt").innerText =
  "signal corrupted... user unstable...";
}

function react(type){
  const map = {
    lost: "system: user is drifting",
    fine: "system: stable but suspicious",
    chaos: "system: MATCH DETECTED",
    ok: "ok noted (ignored)",
    error: "ERROR: nothing is broken but everything feels broken",
    hotdog: "HOTDOG STATUS ACTIVATED 🌭"
  };

  document.getElementById("reactionText").innerText = map[type];
}

</script>

</body>
</html>
