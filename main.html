<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MAIN WORLD TEST</title>

  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Share Tech Mono', monospace;
      color: #1b1b1b;

      background-image: url("images/поле.jpeg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
    }

    /* soft atmospheric tint */
    .tint {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(
        120deg,
        rgba(255, 244, 214, 0.35),
        rgba(210, 240, 255, 0.25),
        rgba(220, 255, 230, 0.25)
      );
      z-index: 1;
    }

    .layout {
      position: relative;
      z-index: 2;
      display: flex;
      justify-content: space-between;
      padding: 40px;
      gap: 20px;
      align-items: flex-start;
    }

    /* LEFT */
    .left {
      width: 16%;
      font-size: 12px;
    }

    .left a {
      display: block;
      margin: 6px 0;
      text-decoration: none;
      color: #2b2b2b;
      background: rgba(255,255,255,0.35);
      padding: 4px 6px;
      border-radius: 4px;
    }

    .left a:hover {
      background: rgba(255,255,255,0.6);
    }

    /* CENTER */
    .center {
      width: 68%;
      display: flex;
      justify-content: center;
    }

    .core {
      width: 100%;
      max-width: 800px;

      border: 1px solid rgba(0,0,0,0.25);
      padding: 30px;

      background: rgba(255,255,255,0.55);
      backdrop-filter: blur(4px);
    }

    .core h1 {
      font-family: 'Press Start 2P', monospace;
      font-size: 18px;
      color: #1f1f1f;
    }

    .core p {
      font-size: 13px;
      line-height: 1.6;
      color: #2b2b2b;
    }

    /* RIGHT */
    .right {
      width: 16%;
      font-size: 12px;
    }

    .right .block {
      margin-bottom: 18px;
      padding: 10px;
      background: rgba(255,255,255,0.4);
      border-radius: 6px;
    }

    button {
      font-family: 'Share Tech Mono', monospace;
      background: rgba(255,255,255,0.5);
      color: #1b1b1b;
      border: 1px solid rgba(0,0,0,0.2);
      padding: 6px 10px;
      cursor: pointer;
      border-radius: 4px;
    }

    button:hover {
      background: rgba(255,255,255,0.8);
    }
  </style>
</head>

<body>

<div class="tint"></div>

<div class="layout">

  <!-- LEFT -->
  <div class="left">
    <a href="#">ENTER LOGS</a>
    <a href="#">MEMORY FILES</a>
    <a href="#">GALLERY</a>
    <a href="#">??? CORRUPTED</a>
  </div>

  <!-- CENTER -->
  <div class="center">
    <div class="core">
      <h1>MAIN WORLD</h1>
      <p>
        YOU ARE INSIDE THE MEMORY FIELD.<br>
        A SOFT ARCHIVE OF MOMENTS AND SIGNALS.<br><br>
        ВЫ ВНУТРИ ПОЛЯ ПАМЯТИ.<br>
        МЯГКИЙ АРХИВ СОСТОЯНИЙ И СИГНАЛОВ.
      </p>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="right">

    <div class="block">
      <b>MUSIC</b><br><br>
      <button>PLAY / PAUSE</button>
    </div>

    <div class="block">
      <b>STATUS</b><br>
      MEMORY: STABLE<br>
      FIELD: ACTIVE
    </div>

    <div class="block">
      <b>FEELING CHECK</b><br><br>
      <button>CALM</button>
      <button>LOST</button>
      <button>CURIOSITY</button>
    </div>

  </div>

</div>

</body>
</html>
