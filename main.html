<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MAIN WORLD</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>

/* ================= BODY ================= */

body {
  margin: 0;
  font-family: 'Share Tech Mono', monospace;

  background-image: url("images/поле.jpeg");
  background-size: cover;
  background-position: center;
  background-attachment: fixed;

  cursor: url("images/snail-slug.gif"), auto;
}

/* ================= TOP MARQUEE ================= */

.marquee {
  width: 100%;
  overflow: hidden;
  background: repeating-linear-gradient(
    45deg,
    #ffea00,
    #ffea00 20px,
    #ff8800 20px,
    #ff8800 40px
  );
  border-bottom: 3px solid black;
}

.marquee span {
  display: inline-block;
  white-space: nowrap;
  font-family: 'Press Start 2P';
  font-size: 10px;
  padding: 12px 0;
  animation: scroll 18s linear infinite;
}

@keyframes scroll {
  from { transform: translateX(100%); }
  to { transform: translateX(-100%); }
}

/* ================= LAYOUT ================= */

.layout {
  display: flex;
  gap: 12px;
  padding: 18px;
}

.left { width: 12%; }
.center { width: 66%; }
.right { width: 22%; }

/* ================= CORE ================= */

.core {
  min-height: 85vh;

  background: linear-gradient(135deg,#fff,#ffd6ff,#d6f7ff);
  border-radius: 20px;

  border: 3px solid black;

  box-shadow:
    inset 0 6px 14px rgba(0,0,0,0.25),
    0 18px 30px rgba(0,0,0,0.35);

  padding: 20px;

  overflow: hidden;
}

/* ================= MALINOVY HEADER (RESTORED) ================= */

h1 {
  font-family: 'Press Start 2P';

  font-size: 46px;

  display: inline-block;
  padding: 14px 18px;

  background: linear-gradient(90deg, #ff2bd6, #ff4d6d, #ff00aa);

  color: white;

  border: 4px solid black;

  box-shadow:
    6px 6px 0 black,
    0 0 20px rgba(255, 0, 170, 0.8),
    0 0 40px rgba(255, 0, 200, 0.5);

  text-shadow:
    2px 2px black,
    0 0 10px #fff;

  animation: titleGlitch 0.9s infinite alternate;
}

@keyframes titleGlitch {
  0% { transform: translate(0,0) scale(1); filter: hue-rotate(0deg); }
  50% { transform: translate(1px,-1px) scale(1.02); }
  100% { transform: translate(-1px,1px) scale(1); filter: hue-rotate(25deg); }
}

/* ================= NOTE BOX ================= */

.note-box {
  margin-top: 15px;
  padding: 16px;

  border-radius: 18px;

  background: rgba(255,255,255,0.85);

  border: 3px solid black;

  box-shadow:
    inset 0 4px 10px rgba(0,0,0,0.25),
    0 10px 18px rgba(0,0,0,0.35);
}

/* ================= GALLERY ================= */

.gallery {
  margin-top: 20px;
  width: 100%;
  overflow: hidden;

  border: 3px solid black;
  background: linear-gradient(90deg,#fff,#ffe6ff,#e6f7ff);

  border-radius: 16px;
  padding: 10px;
}

.gallery-track {
  display: flex;
  gap: 10px;
  width: max-content;

  animation: slide 12s linear infinite;
}

@keyframes slide {
  0% { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}

.gallery-item {
  min-width: 180px;
  height: 120px;

  border: 2px solid black;
  background: white;

  box-shadow: 5px 5px 0 black;

  overflow: hidden;
}

.gallery-item img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

</style>
</head>

<body>

<div class="marquee">
  <span>⚠ SYSTEM ACTIVE • MEMORY LOOP • HOTDOG ERROR • CLICK EVERYTHING •</span>
</div>

<div class="layout">

<div class="left">
  <div>gallery</div>
  <div>diary</div>
  <div>music</div>
  <div>secret</div>
</div>

<div class="center">
<div class="core">

<h1>MAIN WORLD</h1>

<p>you are inside a living system.</p>

<div class="note-box">
  <b>Ты можешь написать сюда заметку</b>
  <textarea></textarea>
</div>

<!-- GALLERY -->
<div class="gallery">
  <div class="gallery-track">

    <div class="gallery-item">
      <img src="https://media.giphy.com/media/3oEjI6SIIHBdRxXI40/giphy.gif">
    </div>

    <div class="gallery-item">
      <img src="https://media.giphy.com/media/l0MYt5jPR6QX5pnqM/giphy.gif">
    </div>

    <div class="gallery-item">
      <img src="https://media.giphy.com/media/26ufdipQqU2lhNA4g/giphy.gif">
    </div>

  </div>
</div>

</div>
</div>

</div>

</body>
</html>
