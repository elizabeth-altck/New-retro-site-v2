<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MAIN WORLD</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Share Tech Mono', monospace;
  background: url("images/поле.jpeg") center/cover fixed;
}

/* TOP CHAOS */
.hotdog-banner {
  width: 100%;
  overflow: hidden;
  background: repeating-linear-gradient(45deg,#ffea00,#ffea00 20px,#ff8800 20px,#ff8800 40px);
  border-bottom: 3px solid black;
}

.hotdog-text {
  white-space: nowrap;
  font-family: 'Press Start 2P';
  font-size: 11px;
  padding: 14px 0;
  animation: scroll 18s linear infinite;
}

@keyframes scroll {
  from { transform: translateX(100%); }
  to { transform: translateX(-100%); }
}

/* LAYOUT */
.layout { display: flex; gap: 20px; padding: 25px; }

.left { width: 12%; background: rgba(255,255,255,0.2); padding: 10px; }
.center { width: 76%; }
.right { width: 12%; background: rgba(0,0,0,0.5); color: white; padding: 12px; }

/* CORE */
.core {
  min-height: 80vh;
  background: rgba(255,255,255,0.78);
  padding: 25px;
  position: relative;
  overflow: hidden;
}

/* 🎨 BRIGHT INTERNET WIDGETS */
.widget {
  margin: 10px 0;
  padding: 10px;
  border: 2px solid black;
  font-weight: bold;
}

.w1 { background: #ff4d4d; color: white; }
.w2 { background: #4dff88; }
.w3 { background: #4da6ff; color: white; }

/* BUTTONS */
button {
  margin: 5px;
  padding: 6px 10px;
  border: 2px solid black;
  cursor: pointer;
}

/* POPUP */
.popup {
  position: fixed;
  top: 20%;
  left: 50%;
  transform: translateX(-50%);
  background: #fff;
  border: 6px solid #ff0000;
  padding: 15px;
  width: 320px;
  display: none;
  z-index: 999;
}

/* close button */
.close {
  float: right;
  cursor: pointer;
  font-weight: bold;
}

/* chaos glow */
.glow {
  box-shadow: 0 0 20px rgba(255,0,0,0.4);
}
</style>
</head>

<body>

<div class="hotdog-banner">
  <div class="hotdog-text">
    🌭 FREE HOTDOG SYSTEM ACTIVE • INTERNET IS BREAKING • CLICK ANYTHING •
  </div>
</div>

<div class="layout">

<!-- LEFT -->
<div class="left">
  <b>NAV</b><br>
  gallery<br>diary<br>music
</div>

<!-- CENTER -->
<div class="center">
<div class="core" id="core">

<h1>MAIN WORLD</h1>

<p id="txt">stable memory stream...</p>

<button onclick="openCode()">ENTER CODE</button>
<button onclick="chaosColor()">GLITCH COLOR</button>

<!-- 🧨 BRIGHT “WEB WIDGETS” -->
<div class="widget w1">
  ОПРОС 1: ты сейчас кто?<br>
  <button onclick="answer('хаос')">хаос</button>
  <button onclick="answer('норм')">норм</button>
</div>

<div class="widget w2">
  ОПРОС 2: сайт живой?<br>
  <button onclick="answer('да')">да</button>
  <button onclick="answer('нет')">нет</button>
</div>

<div class="widget w3">
  СИСТЕМА ВЫБОР:<br>
  <button onclick="effect()">АКТИВИРОВАТЬ ЭФФЕКТ</button>
</div>

<p id="reaction"></p>

</div>
</div>

<!-- RIGHT -->
<div class="right">
  STATUS: ONLINE<br>
  unstable signals<br>
</div>

</div>

<!-- 🪟 POPUP -->
<div class="popup" id="popup">
  <span class="close" onclick="closePopup()">X</span>

  <p>ENTER CODE:</p>
  <input id="code" placeholder="xxxx">

  <button onclick="check()">RUN</button>

  <p id="result"></p>
</div>

<script>

function openCode(){
  document.getElementById("popup").style.display = "block";
}

function closePopup(){
  document.getElementById("popup").style.display = "none";
}

function check(){
  const results = [
    "ACCESS DENIED",
    "NOTHING HAPPENS",
    "SYSTEM ACCEPTED YOU (maybe)",
    "ERROR BUT OK",
    "HOTDOG SIGNAL FOUND 🌭"
  ];

  document.getElementById("result").innerText =
    results[Math.floor(Math.random()*results.length)];
}

function answer(v){
  document.getElementById("reaction").innerText =
    "SYSTEM RESPONSE: " + v;
}

function chaosColor(){
  const colors = ["#ffdddd","#ddffdd","#ddddff","#fff0aa"];
  document.getElementById("core").style.background =
    colors[Math.floor(Math.random()*colors.length)];
}

function effect(){
  document.getElementById("core").classList.toggle("glow");
}

</script>

</body>
</html>
