<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MAIN WORLD</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
:root {
  --page-padding: 25px;
  --column-gap: 20px;
}

body {
  margin: 0;
  font-family: 'Share Tech Mono', monospace;
  color: #1b1b1b;

  background-image: url("images/поле.jpeg");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  background-attachment: fixed;
}

/* HEADER */
.site-header {
  margin-bottom: 4px;
}

.ticker {
  width: 100%;
  overflow: hidden;
  background: #0a0a0a;
  border-bottom: 1px solid #222;
}

.ticker-text {
  white-space: nowrap;
  font-family: 'Press Start 2P', monospace;
  font-size: 11px;
  color: #ffffff;
  padding: 9px 0;
  animation: tickerScroll 28s linear infinite;
}

@keyframes tickerScroll {
  from { transform: translateX(100%); }
  to { transform: translateX(-100%); }
}

.title-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  padding: 14px var(--page-padding) 10px;
}

.site-title {
  font-family: 'Press Start 2P', monospace;
  font-size: 46px;
  line-height: 1.15;
  color: #9b1c1c;
  margin: 0;
  letter-spacing: 1px;
  text-shadow:
    -1px -1px 0 rgba(255, 250, 219, 0.6),
    3px 3px 0 #58131D,
    5px 5px 0 #000000,
    7px 7px 0 #000000;
}

.title-accent {
  flex-shrink: 0;
  width: 72px;
  height: 72px;
}

/* LAYOUT */
.layout {
  display: grid;
  grid-template-columns: 15fr 70fr 15fr;
  gap: var(--column-gap);
  padding: 8px var(--page-padding) var(--page-padding);
}

/* LEFT */
.left {
  background: rgba(0, 0, 0, 0.55);
  color: #f2f2f2;
  padding: 14px 12px;
  border: 1px solid rgba(255, 255, 255, 0.12);
}

.left b {
  display: block;
  margin-bottom: 10px;
  font-size: 13px;
}

.left a {
  display: block;
  text-decoration: none;
  color: #f2f2f2;
  margin: 8px 0;
  font-size: 13px;
}

.core {
  min-height: 80vh;
  background: rgba(155, 143, 67, 0.9);
  padding: 25px;
  border: 2px solid rgba(232, 228, 196, 0.85);
  box-shadow:
    5px 6px 14px rgba(0, 0, 0, 0.42),
    inset 2px 2px 0 rgba(255, 248, 210, 0.55),
    inset -2px -2px 0 rgba(60, 55, 30, 0.22);
}

.core-title {
  font-family: 'Press Start 2P', monospace;
  font-size: 84px;
  line-height: 1.08;
  color: #000;
  text-align: center;
  margin: 0 0 18px;
  letter-spacing: 0;
  text-shadow:
    -2px -2px 0 rgba(255, 250, 219, 0.6),
    -1px -1px 0 rgba(255, 250, 219, 0.6),
    4px 4px 0 #36391C,
    8px 8px 0 #2a2520,
    13px 13px 0 #141414;
}

/* RIGHT */
.right {
  background: rgba(0, 0, 0, 0.55);
  color: #f2f2f2;
  padding: 14px 12px;
  border: 1px solid rgba(255, 255, 255, 0.12);
}

</style>
</head>

<body>

<header class="site-header">
  <div class="ticker">
    <div class="ticker-text">
      old net core · атмосфера 2000-2010х · old net core · атмосфера 2000-2010х ·
    </div>
  </div>
  <div class="title-row">
    <h1 class="site-title">MAIN WORLD</h1>
    <div class="title-accent" aria-hidden="true"></div>
  </div>
</header>

<div class="layout">

<!-- LEFT -->
<div class="left">
  <b>NAV</b>
  <a href="#">gallery</a>
  <a href="#">diary</a>
  <a href="#">music</a>
  <a href="#">secret door</a>
</div>

<!-- CENTER -->
<div class="center">
  <div class="core">

    <h2 class="core-title">my site</h2>

  </div>
</div>

<!-- RIGHT -->
<div class="right">
  <h3>LIVE SYSTEM</h3>

  <p>STATUS: ONLINE</p>
  <p>FIELD: unstable but fine</p>

  <p>EVENTS:</p>
  <ul>
    <li>hotdog broadcast active</li>
    <li>unknown signal detected</li>
  </ul>
</div>

</div>

</body>
</html>
