<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MAIN WORLD</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>

/* ================= BODY ================= */

body {
  margin: 0;
  font-family: 'Share Tech Mono', monospace;

  background-image: url("images/поле.jpeg");
  background-size: cover;
  background-position: center;
  background-attachment: fixed;

  cursor: url("images/snail-slug.gif"), auto;
}

/* ================= MARQUEE ================= */

.marquee {
  width: 100%;
  overflow: hidden;

  background: repeating-linear-gradient(
    45deg,
    #ff0,
    #ff8800,
    #ff00aa,
    #00ffff
  );

  border-bottom: 3px solid black;
}

.marquee span {
  display: inline-block;
  white-space: nowrap;
  font-family: 'Press Start 2P';
  font-size: 10px;
  padding: 12px 0;
  animation: scroll 14s linear infinite;
}

@keyframes scroll {
  from { transform: translateX(100%); }
  to { transform: translateX(-100%); }
}

/* ================= LAYOUT ================= */

.layout {
  display: grid;
  grid-template-columns: 1fr minmax(720px, 900px) 1fr;

  gap: 16px;
  padding: 16px;
}

/* ================= SIDE PANELS (CHAOS STYLE) ================= */

.left,
.right {
  border: 3px solid black;

  background:
    repeating-linear-gradient(
      135deg,
      rgba(255,0,150,0.15),
      rgba(255,0,150,0.15) 10px,
      rgba(0,255,255,0.15) 10px,
      rgba(0,255,255,0.15) 20px
    );

  box-shadow: 6px 6px 0 black;

  padding: 12px;
}

/* ================= CENTER ================= */

.center {
  display: flex;
  justify-content: center;
}

/* ================= CORE ================= */

.core {
  width: 100%;
  min-height: 85vh;

  background: linear-gradient(145deg,#fff,#ffd6ff,#d6f7ff,#fff2b3);

  border: 4px solid black;

  box-shadow:
    inset 0 10px 20px rgba(0,0,0,0.35),
    0 20px 40px rgba(0,0,0,0.4);

  padding: 22px;
}

/* ================= TITLE (RETRO + MALINOVY CHAOS) ================= */

h1 {
  text-align: center;
  font-family: 'Press Start 2P';

  font-size: 44px;

  color: white;

  background: linear-gradient(90deg,#ff0055,#ff00cc,#ff8800,#00ffff);

  border: 4px solid black;

  box-shadow:
    6px 6px 0 black,
    0 0 30px rgba(255,0,150,0.8);

  text-shadow: 2px 2px black;
}

/* ================= NOTE BOX (БОЛЕЕ “ЖИВОЙ”) ================= */

.note-box {
  margin-top: 18px;
  padding: 18px;

  border-radius: 14px;

  background:
    linear-gradient(135deg,#ffffff,#ffe6ff,#e6f7ff);

  border: 3px solid black;

  box-shadow:
    inset 0 8px 14px rgba(0,0,0,0.4),
    inset 0 -4px 10px rgba(255,255,255,0.9),
    0 10px 20px rgba(0,0,0,0.35);
}

textarea {
  width: 100%;
  height: 90px;

  border: 3px solid black;

  padding: 10px;
  background: #fff7ff;
}

button {
  margin-top: 8px;

  padding: 6px 10px;

  border: 3px solid black;

  background: linear-gradient(90deg,#fff,#ffccff);

  cursor: pointer;
}

/* ================= GALLERY ================= */

.gallery {
  margin-top: 22px;

  border: 4px solid black;

  background: linear-gradient(90deg,#fff,#ffe6ff,#e6f7ff);

  overflow: hidden;
}

.gallery-track {
  display: flex;
  gap: 10px;

  width: max-content;

  animation: slide 10s linear infinite;
}

@keyframes slide {
  0% { transform: translateX(0); }
  100% { transform: translateX(-60%); }
}

.gallery-item {
  min-width: 180px;
  height: 120px;

  border: 2px solid black;

  box-shadow: 5px 5px 0 black;
}

.gallery-item img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

</style>
</head>

<body>

<div class="marquee">
  <span>⚠ HOTDOG ERROR SYSTEM ACTIVE • MEMORY CORRUPTION • BUY 3 KG CUCUMBERS •</span>
</div>

<div class="layout">

<div class="left">
  NAV SYSTEM<br><br>
  gallery<br>
  diary<br>
  music<br>
  secret<br>
</div>

<div class="center">
<div class="core">

<h1>MAIN WORLD</h1>

<p>system unstable but alive</p>

<div class="note-box">
  <b>Ты можешь написать сюда заметку</b>
  <textarea></textarea>
  <button>send</button>
</div>

<div class="gallery">

  <div class="gallery-track">

    <div class="gallery-item">
      <img src="https://media.giphy.com/media/3oEjI6SIIHBdRxXI40/giphy.gif">
    </div>

    <div class="gallery-item">
      <img src="https://media.giphy.com/media/l0MYt5jPR6QX5pnqM/giphy.gif">
    </div>

    <div class="gallery-item">
      <img src="https://media.giphy.com/media/26ufdipQqU2lhNA4g/giphy.gif">
    </div>

  </div>

</div>

</div>
</div>

<div class="right">
  system noise<br>
  artifacts active<br>
  memory drifting
</div>

</div>

</body>
</html>
