<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script>(function(){if(location.protocol!=='file:'){var b=document.createElement('base');b.href=location.origin+'/';document.head.appendChild(b);}})();</script>
  <title>secret door</title>
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32.png">
  <link rel="apple-touch-icon" href="images/apple-touch-icon.png">
  <link href="https://fonts.googleapis.com/css2?family=Jura:wght@400;500;600&family=Press+Start+2P&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/secret-door.css">
</head>
<body class="door-room">
  <div class="door-bg" aria-hidden="true"></div>

  <div class="door-shell door-room" id="doorRoom">
    <a class="door-back" href="main.html">← главная</a>

    <p class="door-kicker">secret door · не в nav · v1</p>
    <h1 class="door-title">дверь закрыта.<br>или нет?</h1>

    <div class="door-visual">
      <div class="door-frame">
        <div class="door-panel" id="doorPanel">
          <span class="door-knob" aria-hidden="true"></span>
          <span class="door-glow" aria-hidden="true"></span>
        </div>
      </div>
    </div>

    <p class="door-status" id="doorStatus">тишина. можно постучать.</p>

    <div class="door-actions">
      <button type="button" class="door-btn" id="doorKnockBtn">постучать</button>
      <button type="button" class="door-btn" id="doorListenBtn">прислушаться</button>
    </div>

    <div class="door-reveal" id="doorReveal" hidden>
      <p>щель светится. за дверью — не главная страница, а <a href="cookies.html" target="_blank" rel="noopener">cookie shrine</a> и ещё <a href="under-construction.html" target="_blank" rel="noopener">under construction</a>. мини-миры потом. пока — side doors.</p>
    </div>

    <p class="door-foot">202 · accepted · поле помнит стук</p>
  </div>

  <script>
    (function () {
      const room = document.getElementById('doorRoom');
      const status = document.getElementById('doorStatus');
      const knockBtn = document.getElementById('doorKnockBtn');
      const listenBtn = document.getElementById('doorListenBtn');
      const reveal = document.getElementById('doorReveal');

      let knocks = 0;
      const KNOCKS_NEEDED = 3;

      const KNOCK_LINES = [
        'стук. эхо. никто не отвечает.',
        'ещё раз. за дверью что-то шуршит.',
        'улитка? ветер? 2003?',
      ];

      const LISTEN_LINES = [
        '...тишина, но тёплая.',
        'далёкое radio.exe.',
        'кто-то жуёт cookie. наверное.',
        'пахнет полем.',
      ];

      function pick(list) {
        return list[Math.floor(Math.random() * list.length)];
      }

      knockBtn?.addEventListener('click', () => {
        knockBtn.classList.remove('is-shake');
        void knockBtn.offsetWidth;
        knockBtn.classList.add('is-shake');

        knocks += 1;

        if (knocks < KNOCKS_NEEDED) {
          if (status) status.textContent = KNOCK_LINES[knocks - 1] || 'стук.';
          return;
        }

        room?.classList.add('is-ajar');
        if (status) status.textContent = 'дверь приоткрылась. загляни.';
        if (reveal) reveal.hidden = false;
        knockBtn.disabled = true;
        knockBtn.textContent = 'уже открыто';
      });

      listenBtn?.addEventListener('click', () => {
        if (status && knocks < KNOCKS_NEEDED) {
          status.textContent = pick(LISTEN_LINES);
        } else if (status) {
          status.textContent = 'свет из щели. cookie shrine зовёт.';
        }
      });
    })();
  </script>
</body>
</html>
